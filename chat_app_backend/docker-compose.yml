version: '3.8'

services:
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: dynamodb-local
    ports:
      - "8000:8000"
    volumes:
      # Lưu dữ liệu DynamoDB vào ./data/dynamodb-local
      - ./data/dynamodb-local:/home/dynamodblocal/data
    working_dir: /home/dynamodblocal
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath ./data"
    user: root

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq-local
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      # Lưu dữ liệu RabbitMQ vào ./data/rabbitmq-local
      - ./data/rabbitmq-local:/var/lib/rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest

  redis:
    image: redis:alpine
    container_name: redis-local
    ports:
      - "6379:6379"
    volumes:
      # Lưu dữ liệu Redis vào ./data/redis-local
      - ./data/redis-local:/data
    # Bật AOF để Redis ghi dữ liệu xuống file ngay lập tức
    command: redis-server --appendonly yes